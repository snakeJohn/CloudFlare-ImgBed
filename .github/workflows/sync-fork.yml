name: Sync Fork

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间早上 8:00) 自动执行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你随时在 Actions 页面手动触发执行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须要有写入权限才能同步代码

    steps:
      - name: Sync current repository
        run: gh repo sync ${{ github.repository }} --branch main
        env:
          # 使用 GitHub 自动生成的 Token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
